jdk:
  - openjdk21
before_install:
  - sdk install java 21.0.5-zulu
  - sdk use java 21.0.5-zulu
  - curl -sL https://services.gradle.org/distributions/gradle-9.4.1-bin.zip -o /tmp/gradle.zip
  - unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
  - /tmp/gradle-dist/gradle-9.4.1/bin/gradle wrapper --gradle-version 9.4.1
install:
  - ./gradlew :netlens:assembleRelease :netlens-no-op:assembleRelease
